<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0e14">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Minha Holding</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <h1>Minha Holding</h1>
        <span class="sync-badge" id="syncBadge"></span>
      </div>
      <div class="header-actions" id="headerActions" hidden>
        <button class="btn" id="btnPrices" title="Atualizar cotações">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          <span class="btn-label">Cotar</span>
        </button>
        <button class="btn" id="btnImport" title="Importar JSON">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="btn" id="btnExport" title="Exportar JSON">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button class="btn" id="btnSettings" title="Configurações de API">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <button class="btn" id="btnEdit" title="Editar carteira">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span class="btn-label">Editar</span>
        </button>
      </div>
    </div>
  </header>

  <main class="app-container" id="app">
    <div class="empty-welcome" id="emptyWelcome">
      <div class="empty-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </div>
      <h2>Importe sua carteira</h2>
      <p>Arraste um arquivo <code>.json</code> ou clique para carregar.</p>
      <button class="btn btn--primary btn--lg" id="btnWelcomeImport">Importar JSON</button>
    </div>
    <nav class="tab-nav" id="tabNav"></nav>
    <div id="panels"></div>
  </main>

  <div class="loading-overlay" id="loadingOverlay" hidden>
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p class="loading-text" id="loadingText">Carregando...</p>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>Adicionar Ativo</h3>
      <div class="modal-field">
        <label for="newTicker">Ticker</label>
        <input type="text" id="newTicker" placeholder="Ex: PETR4" autocomplete="off">
      </div>
      <div class="modal-field">
        <label for="newAmount">Quantidade</label>
        <input type="text" id="newAmount" placeholder="Ex: 100" inputmode="decimal" autocomplete="off">
      </div>
      <div class="modal-field">
        <label for="newTarget">Meta % (dentro da classe)</label>
        <input type="text" id="newTarget" placeholder="0 = quarentena" inputmode="decimal" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn" id="modalCancel">Cancelar</button>
        <button class="btn btn--primary" id="modalConfirm">Adicionar</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal modal--wide">
      <h3>Configurações de API</h3>
      <p class="modal-hint">Tokens gratuitos para cotações em tempo real.</p>
      <div class="modal-field">
        <label for="brapiToken">brapi.dev (Ações BR / FIIs)</label>
        <input type="text" id="brapiToken" placeholder="Crie grátis em brapi.dev/dashboard" autocomplete="off">
        <a class="field-link" href="https://brapi.dev" target="_blank" rel="noopener">Criar conta &rarr;</a>
      </div>
      <div class="modal-field">
        <label for="finnhubToken">Finnhub (Ações US / REITs)</label>
        <input type="text" id="finnhubToken" placeholder="Crie grátis em finnhub.io" autocomplete="off">
        <a class="field-link" href="https://finnhub.io/register" target="_blank" rel="noopener">Criar conta &rarr;</a>
      </div>
      <div class="modal-actions">
        <button class="btn" id="settingsCancel">Cancelar</button>
        <button class="btn btn--primary" id="settingsSave">Salvar</button>
      </div>
    </div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-inner">Solte o arquivo JSON aqui</div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <input type="file" id="fileInput" accept=".json" hidden>
  <script src="app.js"></script>
</body>
</html>
